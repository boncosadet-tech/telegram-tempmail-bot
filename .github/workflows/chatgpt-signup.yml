name: ChatGPT signup

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Alias style"
        required: false
        default: "pretty"
        type: choice
        options:
          - pretty
          - short
          - random
      alias:
        description: "Custom alias (overrides mode); ignored when count > 1"
        required: false
        default: ""
      password:
        description: "Custom password; ignored when count > 1"
        required: false
        default: ""
      full_name:
        description: "Custom full name; ignored when count > 1"
        required: false
        default: ""
      age:
        description: "Age (>= 18)"
        required: false
        default: "25"
      count:
        description: "How many accounts to create in parallel (1..10)"
        required: false
        default: "1"
      chat_id:
        description: "Telegram chat id to send the result to"
        required: false
        default: ""

  repository_dispatch:
    types:
      - chatgpt-signup

permissions:
  contents: read

# Same custom alias serializes (so the same email can't be claimed twice in
# parallel). Auto / batch runs get a per-run group so different dispatches
# do not block each other.
concurrency:
  group: chatgpt-signup-${{ github.event.client_payload.alias || inputs.alias || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      indexes: ${{ steps.compute.outputs.indexes }}
      count: ${{ steps.compute.outputs.count }}
    env:
      INPUT_COUNT: ${{ github.event.client_payload.count || inputs.count || '1' }}
    steps:
      - id: compute
        run: |
          set -e
          n="${INPUT_COUNT:-1}"
          if ! [[ "$n" =~ ^[0-9]+$ ]] || [ "$n" -lt 1 ] || [ "$n" -gt 10 ]; then
            echo "::warning::Invalid count '$n'; defaulting to 1"
            n=1
          fi
          arr=$(python3 -c "import json,sys; print(json.dumps(list(range(1,int(sys.argv[1])+1))))" "$n")
          echo "indexes=$arr" >>"$GITHUB_OUTPUT"
          echo "count=$n" >>"$GITHUB_OUTPUT"

  signup:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        index: ${{ fromJson(needs.prepare.outputs.indexes) }}

    env:
      CLOUDFLARE_GLOBAL_API: ${{ secrets.CLOUDFLARE_GLOBAL_API }}
      CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TOKEN_BOT_TELEGRAM }}
      OWNER_CHAT_ID: ${{ github.event.client_payload.chat_id || inputs.chat_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: bot/requirements.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r bot/requirements.txt

      # Split Chromium install into system deps + binary so the heavy
      # ~150 MB browser download can be served from actions/cache while
      # apt-installed runtime libraries (which can't survive across runners)
      # are reinstalled every run.
      - name: Compute Chromium cache key
        id: cache-meta
        run: |
          set -e
          ver=$(python -c "import importlib.metadata as m; print(m.version('patchright'))")
          echo "key=patchright-${{ runner.os }}-${ver}-chromium-v1" >>"$GITHUB_OUTPUT"

      - name: Cache Chromium browser
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ steps.cache-meta.outputs.key }}

      - name: Install Chromium system deps + Xvfb
        run: |
          set -e
          python -m patchright install-deps chromium
          sudo apt-get install -y --no-install-recommends xvfb

      - name: Install Chromium binary
        if: steps.cache-chromium.outputs.cache-hit != 'true'
        run: python -m patchright install chromium

      - name: Run signup
        env:
          PYTHONUNBUFFERED: "1"
          INPUT_MODE: ${{ github.event.client_payload.mode || inputs.mode }}
          INPUT_ALIAS: ${{ github.event.client_payload.alias || inputs.alias }}
          INPUT_PASSWORD: ${{ github.event.client_payload.password || inputs.password }}
          INPUT_FULL_NAME: ${{ github.event.client_payload.full_name || inputs.full_name }}
          INPUT_AGE: ${{ github.event.client_payload.age || inputs.age }}
          BATCH_COUNT: ${{ needs.prepare.outputs.count }}
          MATRIX_INDEX: ${{ matrix.index }}
        run: |
          set -e
          ARGS=(--mode "${INPUT_MODE:-pretty}")
          # Per-account custom values are only honored for single-account
          # runs (count == 1). For batches the signup script auto-generates
          # everything so the N matrix jobs don't all collide on the same
          # alias / password.
          if [ "${BATCH_COUNT:-1}" = "1" ]; then
            [ -n "$INPUT_ALIAS" ] && ARGS+=(--alias "$INPUT_ALIAS")
            [ -n "$INPUT_PASSWORD" ] && ARGS+=(--password "$INPUT_PASSWORD")
            [ -n "$INPUT_FULL_NAME" ] && ARGS+=(--full-name "$INPUT_FULL_NAME")
          fi
          [ -n "$INPUT_AGE" ] && ARGS+=(--age "$INPUT_AGE")
          ARGS+=(--out-dir "./out")
          xvfb-run --auto-servernum --server-args='-screen 0 1366x768x24' \
            python bot/chatgpt_signup.py "${ARGS[@]}"

      - name: Upload cookies artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chatgpt-cookies-${{ matrix.index }}
          path: out/*.json
          if-no-files-found: ignore
          retention-days: 7
