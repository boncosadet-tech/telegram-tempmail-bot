name: telegram_tempmail_mobile
description: Mobile APK frontend for telegram-tempmail-bot Cloudflare provisioning.
publish_to: none
version: 0.1.10+10

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_email_sender: ^8.0.0
  flutter_local_notifications: ^21.0.0
  fluttertoast: ^9.0.0
  sms_autofill: ^2.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/worker/main.js
